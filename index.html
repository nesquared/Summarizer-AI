<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script type="module">
            import {
                pipeline
            } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers';
            let generator;
            async function init(){
                generator = await pipeline('summarization', 'Xenova/distilbart-cnn-6-6');
            }
            init();
            window.processInput = async function() {
            const output = await generator(document.getElementById("content").value, {
                min_length: 80,
                max_length: 500,
                max_new_tokens: 500
            });
            document.getElementById("result").value = output[0]?.summary_text;
        };
        </script>
        <title>Text Summarizer</title>
    </head>

    <body>
        <div class="d-flex justify-content-center align-items-center" style="height:30vh;">
            <h1>Text Summarizer</h1>
        </div>
        <div class="d-flex justify-content-center align-items-center" style="height:30vh;">
            <form>
                <textarea id="content" rows="10" cols="100" placeholder="To summarize text, please paste text here" class="form-control"></textarea>
            </form>
        </div>
        <div class="d-flex justify-content-center align-items-center" style="height:30vh;">
            <button onclick="processInput()" type="button" id="scan-button" class="btn-bluee">Check</button>
        </div>
        <div class="d-flex justify-content-center align-items-center" style="height:30vh;">
        <div class="d-flex justify-content-center align-items-center" style="height:30vh;">
            <form>
                <textarea id="result" rows="5" cols="100" placeholder="Summarized text..." class="form-control"></textarea>
            </form>
        </div>
    </body>
    <style>
        .btn-bluee {
            background: linear-gradient(to right, #1E90FF, #000080);
            /* orange → purple */
            color: white;
            /* text color */
            border: none;
            /* remove default border */
            padding: 10px 10px;
            border-radius: 10px;
            font-weight: bold;
        }

        .btn-bluee:hover {
            background: linear-gradient(to right, #000080, #1E90FF);
            /* darker hover */
        }
    </style>

</style>

</html>
